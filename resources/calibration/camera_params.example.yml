%YAML:1.0
---
# ============================================================================
# Parámetros de calibración de EJEMPLO (cámara web genérica 1280x720).
#
# Este archivo muestra el formato que produce la aplicación al calibrar
# (tecla C para capturar vistas, tecla K para calibrar y guardar).
#
# Para usarlo directamente, renómbralo a "camera_params.yml" en esta misma
# carpeta, o pásalo con:  ar_chessboard --calib <ruta>
# Ten en cuenta que cada cámara tiene sus propios parámetros: para una
# alineación precisa calibra la tuya.
# ============================================================================
camera_matrix: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [ 1.0e+03, 0., 6.4e+02,
           0., 1.0e+03, 3.6e+02,
           0., 0., 1. ]
distortion_coefficients: !!opencv-matrix
   rows: 1
   cols: 5
   dt: d
   data: [ 1.2e-01, -2.5e-01, 1.0e-03, -8.0e-04, 9.0e-02 ]
avg_reprojection_error: 3.4e-01
